<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home OS - Live</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #1e293b; }
        .sidebar-item.active { background-color: white; color: #6366f1; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05); font-weight: 600; }
        .card { background: white; border-radius: 24px; border: 4px solid #e2e8f0; transition: all .2s; }
        .time-btn.active { background-color: #6366f1; color: white; }
        .category-header { cursor: pointer; }
        .collapsed { display: none; }
        ::-webkit-scrollbar { width: 0px; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

<aside class="w-72 bg-slate-100 border-r border-slate-200 p-4 flex flex-col shrink-0">
    <div class="mb-12">
        <h1 class="text-xl font-semibold tracking-tighter text-slate-900 flex items-center">
            <span class="w-3 h-3 bg-indigo-500 rounded-full mr-10"></span>
            Home<span class="font-light text-slate-400">Control</span>
        </h1>
    </div>

    <nav class="space-y-4 flex-1 overflow-y-auto">
        <button onclick="showOverview()" id="btn-overview"
            class="sidebar-item w-full text-left px-5 py-3 rounded-2xl text-slate-500 active">
            🏠 Übersicht
        </button>

        <div class="card p-3">
            <div class="category-header text-[10px] font-bold text-slate-400 uppercase tracking-widest text-center"
                 onclick="toggleCategory('weather')">
                🌦️ Wetter
            </div>
            <div id="nav-weather" class="space-y-1 mt-2"></div>
        </div>

        <div class="card p-3">
            <div class="category-header text-[10px] font-bold text-slate-400 uppercase tracking-widest text-center"
                 onclick="toggleCategory('rooms')">
                Räume
            </div>
            <div id="nav-rooms" class="space-y-1 mt-2"></div>
        </div>

        <div class="card p-3">
            <div class="category-header text-[10px] font-bold text-slate-400 uppercase tracking-widest text-center"
                 onclick="toggleCategory('energy')">
                🔋 Energie
            </div>
            <div id="nav-energy" class="space-y-1 mt-2 collapsed"></div>
        </div>

        <div class="card p-3">
            <div class="category-header text-[10px] font-bold text-slate-400 uppercase tracking-widest text-center"
                 onclick="toggleCategory('system')">
                ⚙️ System
            </div>
            <div id="nav-system" class="space-y-1 mt-2 collapsed"></div>
        </div>
    </nav>

    <div class="mt-auto pt-6 border-t border-slate-200 text-[10px] text-slate-400 uppercase tracking-widest text-center">
        System: <span class="text-emerald-500 font-bold italic">Stable</span>
    </div>
</aside>

<main class="flex-1 h-full overflow-y-auto p-8 md:p-12">
    <header class="mb-12">
        <h2 id="view-title" class="text-4xl font-light text-slate-900 tracking-tight">Dashboard</h2>
        <p id="view-subtitle" class="text-slate-400 mt-1 font-medium uppercase text-[10px] tracking-[0.2em]">
            Alle Sensoren im Blick
        </p>
    </header>

    <div id="content-area"></div>
</main>

<script>
// === Konfiguration & Namen ===
const displayNames = {
    "temp": { name: "Temperaturx", unit: "°C" },
    "hum": { name: "Feuchtigkeit", unit: "%" },
    "air": { name: "Luftqualität", unit: "" },
    "window": { name: "Fensterstatus", unit: "" },
    "power": { name: "PV-Leistung", unit: " W" },
    "voltage": { name: "Spannung", unit: " V" },
    "sunrise": { name: "Sonnenaufgang", unit: "" },
    "sunset": { name: "Sonnenuntergang", unit: "" },
    "ds0": { name: "Kanal 1 (ds0)", unit: " W" },
    "ds1": { name: "Kanal 2 (ds1)", unit: " W" },
    "ds2": { name: "Kanal 3 (ds2)", unit: " W" },
    "ds3": { name: "Kanal 4 (ds3)", unit: " W" }
};

const chartColors = {
    "ds0": { border: '#6366f1', bg: 'rgba(99, 102, 241, 0.05)' },   // Indigo
    "ds1": { border: '#10b981', bg: 'rgba(16, 185, 129, 0.05)' },   // Smaragdgrün
    "ds2": { border: '#f59e0b', bg: 'rgba(245, 158, 11, 0.05)' },   // Bernstein
    "ds3": { border: '#ef4444', bg: 'rgba(239, 68, 68, 0.05)' }     // Rot
};

const categoryStates = { weather: true, rooms: true, energy: false, system: false };
let myChart = null;
let currentActiveItem = null;

const homeData = {
    "🌦️ Wetter": { category: "weather", temp: "20°C, Sonnig", sunrise: "06:15", sunset: "20:45", hum: 65 },
    "🛁 Badezimmer": {
        category: "rooms", temp: 22.5, hum: 85, air: "Gut", window: "offen",
        history: { "Tag": { labels: ['00:00', '06:00', '12:00', '18:00', 'Jetzt'], data: [21, 21.5, 22.8, 22.5, 22.5] } }
    },
    "🗃️ Büro": {
        category: "rooms", temp: 20.1, hum: 45, air: "mittel", window: "geschlossen",
        history: { "Tag": { labels: ['00:00', '06:00', '12:00', '18:00', 'Jetzt'], data: [21, 21.5, 22.8, 22.5, 22.5] } }
    },
    "🔋 PV-Anlage": {
        category: "energy", power: 0, voltage: 0,
        history: { "Tag": { labels: [], datasetsData: {} } }
    }
};

// === Navigation & UI-Wechsel ===
function toggleCategory(category) {
    categoryStates[category] = !categoryStates[category];
    document.getElementById(`nav-${category}`).classList.toggle('collapsed');
    if (document.getElementById('view-title').innerText === 'Dashboard') showOverview();
}

function showOverview() {
    currentActiveItem = null;
    updateSidebarActive('btn-overview');
    document.getElementById('view-title').innerText = "Dashboard";
    document.getElementById('view-subtitle').innerText = "Alle Sensoren im Blick";

    const anyCategoryOpen = Object.values(categoryStates).some(state => state);
    const dataToShow = anyCategoryOpen 
        ? Object.fromEntries(Object.entries(homeData).filter(([_, d]) => categoryStates[d.category]))
        : homeData;

    let html = `<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">`;
    for (const [name, data] of Object.entries(dataToShow)) {
        let firstKey = Object.keys(data).find(k => k !== "category" && k !== "history");
        let firstValue = data[firstKey];
        let unit = displayNames[firstKey]?.unit || "";

        html += `
            <div class="card p-6 cursor-pointer hover:shadow-lg" onclick="showDetailView('${name}')">
                <h3 class="font-semibold text-slate-700 mb-2">${name}</h3>
                <p class="text-2xl font-bold text-slate-900">${firstValue}${unit}</p>
                <p class="text-xs text-slate-400 mt-1">${displayNames[firstKey]?.name || firstKey}</p>
            </div>
        `;
    }
    html += `</div>`;
    document.getElementById('content-area').innerHTML = html;
}

function showDetailView(name) {
    currentActiveItem = name;
    const safeId = `btn-${name.toLowerCase().replace(/[^a-z0-9]/g, '')}`;
    updateSidebarActive(safeId);

    const data = homeData[name];
    document.getElementById('view-title').innerText = name;
    document.getElementById('view-subtitle').innerText = "Detailanalyse & Echtzeit-Verlauf";

    let tilesHtml = '<div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8 text-center">';
    for (const [key, value] of Object.entries(data)) {
        if (key === "category" || key === "history") continue;
        tilesHtml += `
            <div class="card p-4">
                <p class="text-[10px] text-slate-400 font-bold uppercase">${displayNames[key]?.name || key}</p>
                <p class="text-2xl">${value}${displayNames[key]?.unit || ""}</p>
            </div>
        `;
    }
    tilesHtml += '</div>';

    let chartHtml = '';
    if (data.history) {
        chartHtml = `
            <div class="card p-8">
                <div class="flex flex-wrap items-center justify-between gap-4 mb-8">
                    <h4 class="text-xs font-bold text-slate-400 uppercase tracking-[0.2em]">Live Messkurven</h4>
                    <div class="flex space-x-2 bg-slate-50 p-1 rounded-2xl">
                        <button class="time-btn active px-4 py-2 text-[10px] font-bold uppercase tracking-widest rounded-xl">Echtzeit (Tag)</button>
                    </div>
                </div>
                <div class="h-[350px]"><canvas id="detailChart"></canvas></div>
            </div>
        `;
    }

    document.getElementById('content-area').innerHTML = tilesHtml + chartHtml;

    if (name === '🔋 PV-Anlage') {
        console.log('Lade Historie für PV-Anlage...');
        socket.emit('get_history');
    } else if (data.history) {
        updateChartData(name, "Tag");
    }
}

function updateChartData(name, timeRange) {
    const data = homeData[name];
    if (!data.history || !data.history[timeRange]) return;

    const chartData = data.history[timeRange];
    if (!chartData.labels || chartData.labels.length === 0) return;

    const ctx = document.getElementById('detailChart').getContext('2d');
    if (myChart) { myChart.destroy(); }

    let datasets = [];

    if (chartData.datasetsData) {
        Object.keys(chartData.datasetsData).forEach(ch => {
            const colors = chartColors[ch] || { border: '#6366f1', bg: 'transparent' };
            datasets.push({
                label: displayNames[ch]?.name || ch,
                data: chartData.datasetsData[ch],
                borderColor: colors.border,
                borderWidth: 3,
                tension: 0.3,
                pointRadius: 0,          // Kringel standardmäßig aus
                pointHoverRadius: 6,     // Erscheint beim Hovern
                fill: true,
                backgroundColor: colors.bg
            });
        });
    } else {
        // Fallback für statische Demo-Räume
        datasets.push({
            label: 'Temperatur',
            data: chartData.data,
            borderColor: '#6366f1',
            borderWidth: 4,
            tension: 0.4,
            pointRadius: 0,
            pointHoverRadius: 6,
            fill: true,
            backgroundColor: 'rgba(99, 102, 241, 0.15)'
        });
    }

    myChart = new Chart(ctx, {
        type: 'line',
        data: { labels: chartData.labels, datasets: datasets },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { display: true, labels: { boxWidth: 12, font: { size: 11 } } } },
            scales: {
                x: { grid: { display: false }, ticks: { font: { size: 10 }, color: '#94a3b8' } },
                y: { grid: { color: '#f1f5f9' }, ticks: { font: { size: 10 }, color: '#94a3b8' } }
            }
        }
    });
}

function updateSidebarActive(activeId) {
    document.querySelectorAll('.sidebar-item').forEach(btn => btn.classList.remove('active'));
    const btn = document.getElementById(activeId);
    if (btn) btn.classList.add('active');
}

function init() {
    document.getElementById('nav-weather').innerHTML = '<button onclick="showDetailView(\'🌦️ Wetter\')" id="btn-wetter" class="sidebar-item w-full text-left px-5 py-2 rounded-xl text-slate-500">🌦️ Wetter</button>';
    document.getElementById('nav-rooms').innerHTML = `<button onclick="showDetailView('🛁 Badezimmer')" id="btn-badezimmer" class="sidebar-item w-full text-left px-5 py-2 rounded-xl text-slate-500">🛁 Badezimmer</button><button onclick="showDetailView('🗃️ Büro')" id="btn-buro" class="sidebar-item w-full text-left px-5 py-2 rounded-xl text-slate-500">🗃️ Büro</button>`;
    document.getElementById('nav-energy').innerHTML = '<button onclick="showDetailView(\'🔋 PV-Anlage\')" id="btn-pv-anlage" class="sidebar-item w-full text-left px-5 py-2 rounded-xl text-slate-500">🔋 PV-Anlage</button>';
    document.getElementById('nav-system').innerHTML = '<button onclick="showDetailView(\'⚙️ System\')" id="btn-system" class="sidebar-item w-full text-left px-5 py-2 rounded-xl text-slate-500">⚙️ System</button>';
    showOverview();
}

// ==========================================
// WEEBSOCKETS LIVE UPDATES (MÖGLICHKEIT 1)
// ==========================================
const socket = io();

socket.on('live_data', (data) => {
    if (data.power !== undefined) {
        if (homeData['🔋 PV-Anlage']) {
            homeData['🔋 PV-Anlage'].power = parseInt(data.power);
            homeData['🔋 PV-Anlage'].voltage = parseInt(data.voltage);
        }
        
        if (document.getElementById('view-title').innerText === 'Dashboard') {
            showOverview();
        }
        
        if (currentActiveItem === '🔋 PV-Anlage') {
            // Textkacheln updaten
            const cards = document.getElementById('content-area').querySelectorAll('.card p:last-child');
            if (cards.length >= 2) {
                cards[0].innerText = parseInt(data.power) + " W";
                cards[1].innerText = parseInt(data.voltage) + " V";
            }

            // SEKTÜNDLICHER LIVE-PUSH INS CHART
            if (myChart && homeData['🔋 PV-Anlage'].history && homeData['🔋 PV-Anlage'].history["Tag"]) {
                const nowTime = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', second:'2-digit'});
                
                // Neue X-Achsen-Zeit hinzufügen
                myChart.data.labels.push(nowTime);
                
                // Die echten Live-Werte auf die 4 Kanäle splitten (Beispielhaft skaliert)
                const currentLiveValues = {
                    "ds0": data.power,
                    "ds1": data.power * 0.8,
                    "ds2": data.power * 0.5,
                    "ds3": data.power * 0.2
                };

                // Datenpunkte sekündlich anhängen
                myChart.data.datasets.forEach((dataset, idx) => {
                    const channelKey = Object.keys(chartColors)[idx]; 
                    if (channelKey && currentLiveValues[channelKey] !== undefined) {
                        dataset.data.push(currentLiveValues[channelKey]);
                    }
                });

                // Begrenzung: Diagramm scrollt nach links, wenn mehr als 100 Live-Punkte drin sind
                if (myChart.data.labels.length > 100) {
                    myChart.data.labels.shift();
                    myChart.data.datasets.forEach(d => d.data.shift());
                }

                myChart.update('none'); // Flackerfreies und performantes Update
            }
        }
    }
});

// Historische RRD-Basisdaten von Python empfangen
socket.on('get_history', (rrdData) => {
    console.log("RRD Basis-Daten geladen:", rrdData);
    if (!rrdData || rrdData.error || rrdData.length === 0) return;

    const firstRow = rrdData.find(item => item !== null);
    const channels = Object.keys(firstRow).filter(k => k.startsWith('ds'));

    if (homeData['🔋 PV-Anlage']) {
        homeData['🔋 PV-Anlage'].history = {
            "Tag": {
                labels: rrdData.map(item => new Date(item.timestamp * 1000).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})),
                datasetsData: {}
            }
        };

        channels.forEach(ch => {
            homeData['🔋 PV-Anlage'].history["Tag"].datasetsData[ch] = rrdData.map(item => {
                return (item[ch] !== null && !isNaN(item[ch])) ? item[ch] : 0;
            });
        });

        if (currentActiveItem === '🔋 PV-Anlage') {
            updateChartData('🔋 PV-Anlage', 'Tag');
        }
    }
});

init();
</script>
</body>
</html>
